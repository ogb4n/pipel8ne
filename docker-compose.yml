services:
  # ─── Base de données MongoDB (dev) ──────────────────────────────────────────
  db:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pipel8ne
      MONGO_INITDB_ROOT_PASSWORD: dev_password
      MONGO_INITDB_DATABASE: pipel8ne_dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend Fastify ─────────────────────────────────────────────────────────
  backend:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mongodb://pipel8ne:dev_password@db:27017/pipel8ne_dev?authSource=admin
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mongo_data:
